<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panchangam Video Generator</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }

        .field {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input[type="file"] {
            width: 100%;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--primary);
            font-weight: 500;
        }

        .tabs {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .tab-btn {
            width: auto;
            background: none;
            color: var(--text-muted);
            padding: 0.5rem 0;
            margin: 0;
            border-radius: 0;
            border-bottom: 2px solid transparent;
            font-size: 0.875rem;
        }

        .tab-btn:hover {
            background: none;
            color: var(--text);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        input[type="text"] {
            width: 100%;
            padding: 0.625rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            box-sizing: border-box;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        textarea {
            width: 100%;
            padding: 0.625rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            box-sizing: border-box;
            font-family: inherit;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Video Generator</h1>
        <p class="subtitle">Stitch assets or process existing videos</p>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('stitch', this)">Stitch Audio</button>
            <button class="tab-btn" onclick="switchTab('overlay', this)">Mute & Text</button>
            <button class="tab-btn" onclick="switchTab('text-to-image', this)">Text to Image</button>
        </div>

        <div id="tab-stitch" class="tab-content active">
            <form action="/generate" method="post" enctype="multipart/form-data">
                <div class="field">
                    <label for="image">Image</label>
                    <input type="file" id="image" name="image" accept="image/*" required>
                </div>
                <div class="field">
                    <label for="audio">Audio File</label>
                    <input type="file" id="audio" name="audio" accept="audio/*" required>
                </div>
                <button type="submit">Generate & Download</button>
            </form>
        </div>

        <div id="tab-overlay" class="tab-content">
            <form action="/overlay" method="post" enctype="multipart/form-data">
                <div class="field">
                    <label for="video">Video File</label>
                    <input type="file" id="video" name="video" accept="video/*" required>
                </div>
                <div class="field">
                    <label for="message">Overlay Message</label>
                    <input type="text" id="message" name="message" placeholder="Audio muted to avoid copyright infringements">
                </div>
                <button type="submit">Process & Download</button>
            </form>
        </div>

        <div id="tab-text-to-image" class="tab-content">
            <div class="field">
                <label for="quoteText">Quote / Text</label>
                <textarea id="quoteText" rows="4" placeholder="Enter your quote here..."></textarea>
            </div>
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <div style="flex: 1;">
                    <label for="bgColor">Background</label>
                    <input type="color" id="bgColor" value="#4f46e5" style="width: 100%; height: 38px; border: 1px solid #d1d5db; border-radius: 0.5rem; padding: 0;">
                </div>
                <div style="flex: 1;">
                    <label for="textColor">Text Color</label>
                    <input type="color" id="textColor" value="#ffffff" style="width: 100%; height: 38px; border: 1px solid #d1d5db; border-radius: 0.5rem; padding: 0;">
                </div>
            </div>
            <button type="button" onclick="generateQuoteImage()">Generate & Download Image</button>
        </div>

        <div id="loadingMsg" class="loading">
            Processing... Please wait a moment.
        </div>
    </div>

    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            btn.classList.add('active');
        }

        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', function() {
                this.querySelector('button').style.display = 'none';
                document.getElementById('loadingMsg').style.display = 'block';
            });
        });

        function generateQuoteImage() {
            const text = document.getElementById('quoteText').value.trim() || "Your quote here...";
            const bgColor = document.getElementById('bgColor').value;
            const textColor = document.getElementById('textColor').value;

            // Create an off-screen canvas (Instagram square size)
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1080;
            canvas.height = 1080;

            // Fill Background
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Text Style
            ctx.fillStyle = textColor;
            ctx.font = 'bold 64px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Simple word wrapping
            const words = text.split(/\s+/);
            const lines = [];
            let currentLine = '';
            const maxWidth = 880;

            words.forEach(word => {
                const testLine = currentLine + (currentLine ? ' ' : '') + word;
                if (ctx.measureText(testLine).width > maxWidth && currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                } else {
                    currentLine = testLine;
                }
            });
            lines.push(currentLine);

            // Draw centered text
            const lineHeight = 80;
            const startY = (canvas.height - (lines.length - 1) * lineHeight) / 2;
            lines.forEach((line, i) => ctx.fillText(line, 540, startY + (i * lineHeight)));

            // Trigger Download
            const link = document.createElement('a');
            link.download = `quote-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
