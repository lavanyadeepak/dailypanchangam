<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panchangam Video Generator</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }

        .field {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input[type="file"] {
            width: 100%;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--primary);
            font-weight: 500;
        }

        .tabs {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .tab-btn {
            width: auto;
            background: none;
            color: var(--text-muted);
            padding: 0.5rem 0;
            margin: 0;
            border-radius: 0;
            border-bottom: 2px solid transparent;
            font-size: 0.875rem;
        }

        .tab-btn:hover {
            background: none;
            color: var(--text);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        input[type="text"] {
            width: 100%;
            padding: 0.625rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            box-sizing: border-box;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Video Generator</h1>
        <p class="subtitle">Stitch assets or process existing videos</p>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('stitch', this)">Stitch Audio</button>
            <button class="tab-btn" onclick="switchTab('overlay', this)">Mute & Text</button>
        </div>

        <div id="tab-stitch" class="tab-content active">
            <form action="/generate" method="post" enctype="multipart/form-data">
                <div class="field">
                    <label for="image">Image</label>
                    <input type="file" id="image" name="image" accept="image/*" required>
                </div>
                <div class="field">
                    <label for="audio">Audio File</label>
                    <input type="file" id="audio" name="audio" accept="audio/*" required>
                </div>
                <button type="submit">Generate & Download</button>
            </form>
        </div>

        <div id="tab-overlay" class="tab-content">
            <form action="/overlay" method="post" enctype="multipart/form-data">
                <div class="field">
                    <label for="video">Video File</label>
                    <input type="file" id="video" name="video" accept="video/*" required>
                </div>
                <div class="field">
                    <label for="message">Overlay Message</label>
                    <input type="text" id="message" name="message" placeholder="Audio muted to avoid copyright infringements">
                </div>
                <button type="submit">Process & Download</button>
            </form>
        </div>

        <div id="loadingMsg" class="loading">
            Processing... Please wait a moment.
        </div>
    </div>

    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            btn.classList.add('active');
        }

        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', function() {
                this.querySelector('button').style.display = 'none';
                document.getElementById('loadingMsg').style.display = 'block';
            });
        });
    </script>
</body>
</html>
