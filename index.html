<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panchangam Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit&family=Lohit+Tamil&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles/styles.css">
</head>
<body>

<!-- TAB BAR -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('form')">📝 Enter Details</button>
  <button class="tab-btn" id="preview-tab-btn" onclick="showTab('preview')">📜 Panchangam Preview</button>
</div>

<!-- FORM PANEL -->
<div class="panel active" id="tab-form">
  <div class="form-wrapper">
    <h2>பஞ்சாங்கம் விவரங்கள் / Panchangam Details</h2>
    <div class="form-grid">

      <div class="section-title">📅 Date & Day / தேதி</div>

      <div class="field">
        <label>Date (தேதி) *</label>
        <input type="date" id="f_date">
      </div>
      <div class="field">
        <label>Day in Tamil (கிழமை) *</label>
        <input type="text" id="f_day" list="list_vasara" placeholder="e.g. புதன் கிழமை">
      </div>
      <div class="field">
        <label>Tamil Month (மாதம்) *</label>
        <input type="text" id="f_month" list="list_months" placeholder="e.g. பங்குனி">
      </div>
      <div class="field">
        <label>Tamil Date/Thithi No (திதி எண்)</label>
        <input type="text" id="f_thithi_no" placeholder="e.g. 25">
      </div>

      <div class="section-title">🌅 Pancha Attributes / பஞ்சாங்க அம்சங்கள்</div>

      <div class="field">
        <label>Samvatsara (நாம சம்வத்சரே)</label>
        <input type="text" id="f_samvat" list="list_years" placeholder="e.g. விஸ்வாவசு">
      </div>
      <div class="field">
        <label>Ayanam (ஆயணம்)</label>
        <input type="text" id="f_ayanam" list="list_ayanams" placeholder="e.g. உத்தராயணே">
      </div>
      <div class="field">
        <label>Ruthu (ருதெள)</label>
        <input type="text" id="f_ruthu" list="list_rutus" placeholder="e.g. சிசிர ருதெள">
      </div>
      <div class="field">
        <label>Maasam (மாஸே)</label>
        <input type="text" id="f_maasam" list="list_months" placeholder="e.g. மீன மாஸே">
      </div>
      <div class="field">
        <label>Paksha (பக்ஷம்)</label>
        <input type="text" id="f_paksha" list="list_paksha" placeholder="e.g. க்ருஷ்ண பக்ஷம்">
      </div>
      <div class="field">
        <label>Thithi (திதெள) with End Time</label>
        <input type="text" id="f_thithi" list="list_thithis" placeholder="e.g. ஷஷ்ட்யாம் (05:41 Pm)">
      </div>
      <div class="field">
        <label>Next Thithi (அடுத்த திதெள)</label>
        <input type="text" id="f_thithi2" list="list_thithis" placeholder="e.g. ஸப்தம்யாம்">
      </div>
      <div class="field">
        <label>Vasara (வாஸர)</label>
        <input type="text" id="f_vasara" list="list_vasara" placeholder="e.g. ஸெளம்ய வாஸர யுக்தாயாம்">
      </div>
      <div class="field">
        <label>Nakshatra (நக்ஷத்ர) with End Time</label>
        <input type="text" id="f_star" list="list_stars" placeholder="e.g. மூலா (06:00 Am Till 09th)">
      </div>
      <div class="field">
        <label>Next Nakshatra (அடுத்த நக்ஷத்ரம்)</label>
        <input type="text" id="f_star2" list="list_stars" placeholder="e.g. பூர்வஷாடா">
      </div>
      <div class="field">
        <label>Yoga (யோக) with End Time</label>
        <input type="text" id="f_yoga" list="list_yogas" placeholder="e.g. வரியான் (03:53 Pm)">
      </div>
      <div class="field">
        <label>Next Yoga</label>
        <input type="text" id="f_yoga2" list="list_yogas" placeholder="e.g. பரிக">
      </div>
      <div class="field">
        <label>Karanam (கரண) with End Time</label>
        <input type="text" id="f_karanam" list="list_karanams" placeholder="e.g. வணிஜ (05:41 Pm)">
      </div>
      <div class="field">
        <label>Next Karanam</label>
        <input type="text" id="f_karanam2" list="list_karanams" placeholder="e.g. பத்ர">
      </div>

      <div class="section-title">☀️ Sun & Timings / சூர்யன் & நேரங்கள்</div>

      <div class="field">
        <label>Place (இடம்)</label>
        <input type="text" id="f_place" placeholder="e.g. சென்னை">
      </div>
      <div class="field">
        <label>Sunrise - உதயம்</label>
        <input type="text" id="f_sunrise" placeholder="e.g. 06:03 Am">
      </div>
      <div class="field">
        <label>Sunset - அஸ்தம்</label>
        <input type="text" id="f_sunset" placeholder="e.g. 06:16 Pm">
      </div>
      <div class="field">
        <label>Yoga (யோகம்)</label>
        <input type="text" id="f_sun_yoga" placeholder="e.g. மரண யோகம் : 06:00 Am Till 09th">
      </div>
      <div class="field">
        <label>Nalla Neram - Morning (காலை)</label>
        <input type="text" id="f_nalla_morning" placeholder="e.g. 09:00 / 10:00">
      </div>
      <div class="field">
        <label>Nalla Neram - Evening (மாலை)</label>
        <input type="text" id="f_nalla_evening" placeholder="e.g. 07:00 / 10:00">
      </div>
      <div class="field">
        <label>Rahu Kalam (ராகு காலம்)</label>
        <input type="text" id="f_rahu" placeholder="e.g. 12:00 To 01:30 Pm">
      </div>
      <div class="field">
        <label>Yama Gandam (எமகண்டம்)</label>
        <input type="text" id="f_yama" placeholder="e.g. 07:30 To 09:00 Am">
      </div>
      <div class="field">
        <label>Kuligai (குளிகை)</label>
        <input type="text" id="f_kuligai" placeholder="e.g. 10:30 TO 12:00 Noon">
      </div>
      <div class="field">
        <label>Srartha Thithi (ஸ்ராத்த திதி)</label>
        <input type="text" id="f_srartha" list="list_thithis" placeholder="e.g. க்ருஷண - ஷஷ்டி">
      </div>

      <div class="section-title">🙏 Vathyar / வாத்யார் விவரம்</div>

      <div class="field full">
        <label>Vathyar Name & Place (வாத்யார் பெயர் & இடம்)</label>
        <input type="text" id="f_vathyar" placeholder="e.g. மதுராந்தகம் ஆயனம் கோபாலகிருஷ்ணன் வாத்யார் ஊரப்பாக்கம்">
      </div>
      <div class="field">
        <label>Phone 1</label>
        <input type="text" id="f_phone1" placeholder="e.g. 9791177286">
      </div>
      <div class="field">
        <label>Phone 2</label>
        <input type="text" id="f_phone2" placeholder="e.g. 9445627286">
      </div>

    </div>
    <button class="generate-btn" onclick="generateCard()">📜 Generate Panchangam</button>
  </div>
</div>

<!-- PREVIEW PANEL -->
<div class="panel" id="tab-preview">
  <div class="action-row">
    <button class="action-btn edit-btn" onclick="showTab('form')">✏️ Edit</button>
    <button class="action-btn print-btn" onclick="window.print()">🖨️ Print</button>
  </div>
  <div class="card-wrapper">
    <div class="pcard" id="pcard-output">
      <p style="text-align:center;color:#999;padding:40px 0;">Fill in the form and click "Generate Panchangam"</p>
    </div>
  </div>
</div>

<datalist id="list_months"></datalist>
<datalist id="list_years"></datalist>
<datalist id="list_ayanams"></datalist>
<datalist id="list_rutus"></datalist>
<datalist id="list_paksha"></datalist>
<datalist id="list_thithis"></datalist>
<datalist id="list_vasara"></datalist>
<datalist id="list_stars"></datalist>
<datalist id="list_yogas"></datalist>
<datalist id="list_karanams"></datalist>

<script src="./assets/data/data.js"></script>
<script src="./assets/scripts/scripts.js"></script>
</body>
</html>
